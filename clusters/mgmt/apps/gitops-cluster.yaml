---
# Cluster API Cluster object
apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: "gitops-cluster"
  namespace: "default"
  labels:
    cni: "cilium"
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
        - "10.246.0.0/16"
    services:
      cidrBlocks:
        - "10.98.0.0/12"
  infrastructureRef:
    apiVersion: infrastructure.e2enetworks.com/v1beta1
    kind: E2ECluster
    name: "gitops-cluster"
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1beta1
    kind: KubeadmControlPlane
    name: "gitops-cluster-control-plane"
---
# E2E Infrastructure Cluster
apiVersion: infrastructure.e2enetworks.com/v1beta1
kind: E2ECluster
metadata:
  name: "gitops-cluster"
  namespace: "default"
spec:
  region: "ncr"
  location: "Delhi"
  network:
    vpcID: ""
  loadBalancer:
    securityGroupID: 37263
---
# Control Plane
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KubeadmControlPlane
metadata:
  name: "gitops-cluster-control-plane"
  namespace: "default"
spec:
  replicas: 1
  version: "v1.33.0"
  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.e2enetworks.com/v1beta1
      kind: E2EMachineTemplate
      name: "gitops-cluster-control-plane"
  kubeadmConfigSpec:
    initConfiguration:
      nodeRegistration: {}
    joinConfiguration:
      nodeRegistration: {}
---
# Control Plane Machine Template
apiVersion: infrastructure.e2enetworks.com/v1beta1
kind: E2EMachineTemplate
metadata:
  name: "gitops-cluster-control-plane"
  namespace: "default"
spec:
  template:
    spec:
      plan: "C3-4vCPU-8RAM-100DISK-C3-Onetemplate-Ubuntu24.04-Delhi"
      image: "Ubuntu-24.04-Distro"
      location: "Delhi"
      sshKeys:
        - "ssh-rsa  roniee007@rounak-Latitude"
      enablePublicIP: true
---
# Worker MachineDeployment
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: "gitops-cluster-md-0"
  namespace: "default"
spec:
  clusterName: "gitops-cluster"
  replicas: 1
  selector:
    matchLabels: {}
  template:
    spec:
      clusterName: "gitops-cluster"
      version: "v1.33.0"
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
          kind: KubeadmConfigTemplate
          name: "gitops-cluster-md-0"
      infrastructureRef:
        apiVersion: infrastructure.e2enetworks.com/v1beta1
        kind: E2EMachineTemplate
        name: "gitops-cluster-md-0"
---
# Worker Machine Template
apiVersion: infrastructure.e2enetworks.com/v1beta1
kind: E2EMachineTemplate
metadata:
  name: "gitops-cluster-md-0"
  namespace: "default"
spec:
  template:
    spec:
      plan: "C3-4vCPU-8RAM-100DISK-C3-Onetemplate-Ubuntu24.04-Delhi"
      image: "Ubuntu-24.04-Distro"
      location: "Delhi"
      sshKeys:
        - "ssh-rsa  roniee007@rounak-Latitude"
      enablePublicIP: true
---
# Worker Bootstrap Config
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KubeadmConfigTemplate
metadata:
  name: "gitops-cluster-md-0"
  namespace: "default"
spec:
  template:
    spec:
      joinConfiguration:
        nodeRegistration: {}
